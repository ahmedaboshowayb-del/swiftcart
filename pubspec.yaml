name: swiftcart
description: SwiftCart – Production E-Commerce & Delivery App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # ---------------- STATE MANAGEMENT ----------------
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---------------- NAVIGATION ----------------
  go_router: ^14.2.0

  # ---------------- FIREBASE ----------------
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.1

  # ---------------- NETWORKING ----------------
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ---------------- MAPS & LOCATION ----------------
  flutter_map: ^6.1.0          
  latlong2: ^0.9.0             
  geolocator: ^11.0.0        
  
  # ---------------- MODEL GENERATION ----------------
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ---------------- LOCAL STORAGE ----------------
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ---------------- UI & ANIMATION ----------------
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.15.0
  badges: ^3.1.2
  gap: ^3.0.1

  # ---------------- LOCALIZATION ----------------
  intl: ^0.20.2

  # ---------------- UTILITIES ----------------
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  uuid: ^4.4.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

  hive_generator: ^2.0.1



flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF6B35"
  adaptive_icon_foreground: "assets/icons/app_icon.png"